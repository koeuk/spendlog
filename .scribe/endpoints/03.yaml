  -
    custom: []
    httpMethods:
      - POST
    uri: api/v1/categories
    metadata:
      custom: []
      groupName: Categories
      groupDescription: |-

        The shared taxonomy every expense and budget hangs off. Readable by everyone,
        writable by admins only — and a token needs `categories:write` on top of that.
      subgroup: ''
      subgroupDescription: ''
      title: 'Create a category'
      description: |-
        Admins only, and the token needs `categories:write` — which is **not**
        granted by default.

        The name is translatable, so it is sent as a per-locale map rather than a
        string. English is the fallback locale and is therefore required; Khmer is
        optional, and an empty locale is dropped rather than stored as "".
      authenticated: true
      deprecated: false
    headers:
      Authorization: 'Bearer {YOUR_AUTH_TOKEN}'
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters:
      name:
        custom: []
        name: name
        description: 'Per-locale names.'
        required: true
        example: []
        type: object
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
      name.en:
        custom: []
        name: name.en
        description: 'Must be unique among English names.'
        required: true
        example: Travel
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
      name.km:
        custom: []
        name: name.km
        description: 'Optional Khmer name. Must be unique among Khmer names.'
        required: false
        example: ការធ្វើដំណើរ
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: true
        deprecated: false
      color:
        custom: []
        name: color
        description: 'One of: slate, red, orange, amber, green, teal, blue, indigo, purple, pink.'
        required: true
        example: blue
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
      icon:
        custom: []
        name: icon
        description: 'One of the CategoryIcon values, or null.'
        required: false
        example: plane
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: true
        deprecated: false
    cleanBodyParameters:
      name:
        en: Travel
        km: ការធ្វើដំណើរ
      color: blue
      icon: plane
    fileParameters: []
    responses:
      -
        custom: []
        status: 201
        content: '{"data": {"uuid": "0198a...", "name": "Travel", "name_translations": {"en": "Travel", "km": "ការធ្វើដំណើរ"}, "color": "blue", "icon": "plane"}}'
        headers: []
        description: ''
      -
        custom: []
        status: 403
        content: '{"message": "This action is unauthorized."}'
        headers: []
        description: 'not an admin, or token lacks categories:write'
      -
        custom: []
        status: 422
        content: '{"message": "A category called \"Travel\" already exists.", "errors": {"name.en": ["A category called \"Travel\" already exists."]}}'
        headers: []
        description: 'duplicate name'
    responseFields: []
    auth:
      - headers
      - Authorization
      - 'Bearer 6g43cv8PD1aE5beadkZfhV6'
    controller: null
    method: null
    route: null
