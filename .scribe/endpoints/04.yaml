name: Budgets
description: |-

  A budget is one `(category, month)` slot. **Omit `category_uuid` for the
  overall budget** covering every category.
endpoints:
  -
    custom: []
    httpMethods:
      - GET
    uri: api/v1/budgets
    metadata:
      custom: []
      groupName: Budgets
      groupDescription: |-

        A budget is one `(category, month)` slot. **Omit `category_uuid` for the
        overall budget** covering every category.
      subgroup: ''
      subgroupDescription: ''
      title: 'List budgets'
      description: |-
        The stored budgets themselves. For spent-vs-budget figures use the
        summary endpoint — that is what the Budgets screen renders.
      authenticated: true
      deprecated: false
    headers:
      Authorization: 'Bearer {YOUR_AUTH_TOKEN}'
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters:
      month:
        custom: []
        name: month
        description: 'Restrict to one month, as YYYY-MM.'
        required: false
        example: 2026-07
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
    cleanQueryParameters:
      month: 2026-07
    bodyParameters: []
    cleanBodyParameters: []
    fileParameters: []
    responses:
      -
        custom: []
        status: 200
        content: '{"data": [{"uuid": "0198b...", "amount": "250.00", "month": "2026-07", "category": {"uuid": "0198a...", "name": "Food", "color": "amber", "icon": "utensils"}, "created_at": "2026-07-16T10:00:00+00:00", "updated_at": "2026-07-16T10:00:00+00:00"}]}'
        headers: []
        description: ''
    responseFields: []
    auth:
      - headers
      - Authorization
      - 'Bearer 6g43cv8PD1aE5beadkZfhV6'
    controller: null
    method: null
    route: null
  -
    custom: []
    httpMethods:
      - GET
    uri: api/v1/budgets/summary
    metadata:
      custom: []
      groupName: Budgets
      groupDescription: |-

        A budget is one `(category, month)` slot. **Omit `category_uuid` for the
        overall budget** covering every category.
      subgroup: ''
      subgroupDescription: ''
      title: 'Spend vs budget'
      description: |-
        Spend against budget for one month, per category and overall — the same
        service the web Dashboard and Budgets page use, so the three can never
        disagree.

        `status` is `ok` | `warning` (>=80%) | `over` (>100%) | `none` (no budget
        set). `budget: null` means no budget, which is different from `"0.00"`.
        `bar_percent` is capped at 100 so a progress bar cannot overflow its
        track; `percent` keeps the truth.
      authenticated: true
      deprecated: false
    headers:
      Authorization: 'Bearer {YOUR_AUTH_TOKEN}'
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters:
      month:
        custom: []
        name: month
        description: 'YYYY-MM. Anything malformed falls back to the current month rather than erroring.'
        required: false
        example: 2026-07
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
    cleanQueryParameters:
      month: 2026-07
    bodyParameters: []
    cleanBodyParameters: []
    fileParameters: []
    responses:
      -
        custom: []
        status: 200
        content: '{"data": {"month": "2026-07", "overall": {"budget_uuid": "0198b...", "spent": "106.00", "budget": "100.00", "remaining": "-6.00", "percent": 106, "bar_percent": 100, "status": "over"}, "categories": [{"uuid": "0198a...", "name": "Food", "color": "amber", "icon": "utensils", "budget_uuid": "0198b...", "spent": "106.00", "budget": "100.00", "remaining": "-6.00", "percent": 106, "bar_percent": 100, "status": "over"}]}}'
        headers: []
        description: ''
    responseFields: []
    auth:
      - headers
      - Authorization
      - 'Bearer 6g43cv8PD1aE5beadkZfhV6'
    controller: null
    method: null
    route: null
