        custom: []
        status: 400
        content: '{"message": "Requested filter(s) `user` are not allowed."}'
        headers: []
        description: 'non-admin used filter[user]'
    responseFields: []
    auth:
      - headers
      - Authorization
      - 'Bearer 6g43cv8PD1aE5beadkZfhV6'
    controller: null
    method: null
    route: null
