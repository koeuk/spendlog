name: Expenses
description: |-

  Daily expense tracking. Every listing is scoped to the caller's own rows
  unless an admin explicitly opts out with `scope=all`.
endpoints:
  -
    custom: []
    httpMethods:
      - GET
    uri: api/v1/expenses
    metadata:
      custom: []
      groupName: Expenses
      groupDescription: |-

        Daily expense tracking. Every listing is scoped to the caller's own rows
        unless an admin explicitly opts out with `scope=all`.
      subgroup: ''
      subgroupDescription: ''
      title: 'List expenses'
      description: |-
        Paginated, newest first.

        `filter[user]` exists only while an admin is viewing everyone; for anyone
        else it is a 400, not a silently empty result.
      authenticated: true
      deprecated: false
    headers:
      Authorization: 'Bearer {YOUR_AUTH_TOKEN}'
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters:
      'filter[item]':
        custom: []
        name: 'filter[item]'
        description: 'Partial match on the item name.'
        required: false
        example: coffee
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
      'filter[category]':
        custom: []
        name: 'filter[category]'
        description: 'Category UUID.'
        required: false
        example: 0198a1b2-c3d4-7e5f-8a9b-0c1d2e3f4a5b
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
      'filter[from]':
        custom: []
        name: 'filter[from]'
        description: 'date Only expenses on or after this day.'
        required: false
        example: '2026-07-01'
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
      'filter[to]':
        custom: []
        name: 'filter[to]'
        description: 'date Only expenses on or before this day.'
        required: false
        example: '2026-07-31'
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
      'filter[user]':
        custom: []
        name: 'filter[user]'
        description: 'Admin only, and only with scope=all. User UUID.'
        required: false
        example: architecto
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
      sort:
        custom: []
        name: sort
        description: 'spent_on, price or item. Prefix with - to reverse.'
        required: false
        example: '-price'
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
      scope:
        custom: []
        name: scope
        description: 'Admin only. Set to "all" to list every user''s expenses and include `owner`.'
        required: false
        example: all
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
      per_page:
        custom: []
        name: per_page
        description: 'Default 50, clamped to 100.'
        required: false
        example: 25
        type: integer
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
    cleanQueryParameters:
      'filter[item]': coffee
      'filter[category]': 0198a1b2-c3d4-7e5f-8a9b-0c1d2e3f4a5b
      'filter[from]': '2026-07-01'
      'filter[to]': '2026-07-31'
      'filter[user]': architecto
      sort: '-price'
      scope: all
